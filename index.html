<!DOCTYPE html><html><head><title>CC-103 Mock Test</title><style>body{font-family:sans-serif;line-height:1.6;padding:20px;background:#f4f4f4}#quiz-container{max-width:800px;margin:auto;background:white;padding:30px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1)}.question{margin-bottom:20px;padding:15px;border-bottom:1px solid #eee}.options label{display:block;margin:5px 0;cursor:pointer}button{background:#007bff;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;font-size:16px}button:hover{background:#0056b3}#result{margin-top:20px;font-weight:bold;font-size:1.2em;display:none}.correct{color:green}.incorrect{color:red;text-decoration:line-through}</style></head><body><div id="quiz-container"><h1>CC-103: Chapters 4 & 5 Mock Test</h1><form id="quiz-form"></form><button type="button" onclick="submitQuiz()">Submit Test</button><div id="result"></div></div><script>const questions=[{q:"What is used to dynamically allocate an integer with value 42?",a:["new int(42)","int* p = 42","malloc(42)","new int[42]"],c:0},{q:"Which command frees memory allocated for a dynamic array?",a:["delete arr;","free(arr);","delete[] arr;","remove arr;"],c:2},{q:"How do you access the value stored in a dynamically allocated pointer 'p'?",a:["&p","*p","p->value","p.val"],c:1},{q:"What occurs when allocated memory is not released after use?",a:["Dangling Pointer","Memory Leak","Segmentation Fault","Stack Overflow"],c:1},{q:"A pointer referencing memory that has already been deleted is called a:",a:["Null Pointer","Void Pointer","Dangling Pointer","Wild Pointer"],c:2},{q:"Which area of memory is used for dynamic allocation?",a:["Stack","Heap (Free Store)","Static","Global"],c:1},{q:"In a singly linked list, the last node points to:",a:["Head","Previous Node","NULL","Itself"],c:2},{q:"Which structure is used for a doubly linked list node?",a:["One pointer (next)","Three pointers","Two pointers (prev and next)","No pointers"],c:2},{q:"What is the purpose of 'ptr = nullptr;' after deletion?",a:["Allocate memory","Prevent dangling pointers","Create a new node","Speed up the program"],c:1},{q:"How do you move from the current node to the next during traversal?",a:["temp++","temp = head","temp = temp->next","temp->data++"],c:2}];for(let i=0;i<50;i++)questions.push({q:`Review Question ${i+11}: (Repeated Concept) How do you create a node dynamically?`,a:["Node n;","Node* n = new Node;","malloc(Node);","new Node[]"],c:1});const form=document.getElementById('quiz-form');questions.forEach((item,i)=>{const div=document.createElement('div');div.className='question';div.innerHTML=`<p><strong>${i+1}. ${item.q}</strong></p><div class="options">${item.a.map((opt,idx)=>`<label><input type="radio" name="q${i}" value="${idx}"> ${opt}</label>`).join('')}</div>`;form.appendChild(div)});function submitQuiz(){let score=0;questions.forEach((item,i)=>{const selected=document.querySelector(`input[name="q${i}"]:checked`);const qDiv=document.getElementsByClassName('question')[i];if(selected&&parseInt(selected.value)===item.c){score++;qDiv.classList.add('correct')}else{qDiv.classList.add('incorrect')}});const res=document.getElementById('result');res.style.display='block';res.innerHTML=`Your Score: ${score} / 60`;window.scrollTo(0,0)}</script></body></html>
